name: SSH Debug Session

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Session note (optional)"
        required: false
        default: "General debug session"

jobs:
  ssh-session:
    name: Start SSH Session
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Session Info
        run: |
          echo "=================================="
          echo "  SSH DEBUG SESSION STARTED"
          echo "=================================="
          echo "  Note    : ${{ github.event.inputs.message }}"
          echo "  Started : $(date)"
          echo "  Timeout : 6 hours"
          echo "  CPU     : $(nproc) cores"
          echo "  RAM     : $(free -h | awk '/^Mem:/{print $2}')"
          echo "  Storage : $(df -h / | awk 'NR==2{print $4}') free"
          echo "=================================="

      - name: Start SSH Session via Cloudflare Tunnel
        uses: valeriangalliat/action-sshd-cloudflared@v4
        env:
          AUTHORIZED_KEYS: ${{ secrets.SSH_PUBLIC_KEY }}
